name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install pytest pytest-cov "ruff>=0.8,<1.0" bandit

      - name: Ruff lint + format
        run: ruff check framework.py prepare.py sentinel.py && ruff format --check framework.py prepare.py sentinel.py

      - name: Run tests with coverage
        run: python -m pytest tests/ -v --cov=framework --cov=prepare --cov=sentinel --cov-report=term-missing --cov-fail-under=70

      - name: Security scan
        run: bandit -r framework.py prepare.py sentinel.py -ll

      - name: ShellCheck
        run: shellcheck hooks/*.sh
