site_name: Ouro Loop
site_url: https://victorvvedtion.github.io/ouro-loop/
site_description: "Autonomous AI coding with runtime-enforced guardrails. Bounded autonomy for Claude Code, Cursor, Aider, and Codex."
site_author: VictorVVedtion
repo_url: https://github.com/VictorVVedtion/ouro-loop
repo_name: VictorVVedtion/ouro-loop

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Concepts:
    - Overview: concepts.md
  - Guides:
    - Quick Start: guides/quick-start.md
    - Sentinel (24/7 Review): guides/sentinel.md
    - Claude Code Integration: guides/claude-code.md
    - Cursor Integration: guides/cursor.md
  - Examples:
    - Overview: examples/index.md
    - Blockchain L1: examples/blockchain-l1.md
    - Consumer Product: examples/consumer-product.md
    - Financial System: examples/financial-system.md
    - ML Research: examples/ml-research.md
  - Session Logs:
    - Overview: session-logs/index.md
    - Blockchain Session: session-logs/blockchain-l1.md
    - Consumer Product Session: session-logs/consumer-product.md
  - Comparison: comparison.md
  - Manifesto: manifesto.md
  - FAQ: faq.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/VictorVVedtion/ouro-loop
